<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#38B249" />
    <meta name="description" content="Pulsenow - know who to call. Right now." />
    <title>Pulsenow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/index-pulsenow-runtime.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DybZsEyO.css" />
    <style>
      html[data-pn-theme="light"] {
        --color-bg: #f7f9fc !important;
        --color-text: #101828 !important;
        --color-accent: #e8f2ea !important;
        --color-surface: #ffffff !important;
        --color-card: #ffffff !important;
        --color-sub: #667085 !important;
        color-scheme: light !important;
      }

      html[data-pn-theme="dark"] {
        --color-bg: #000000 !important;
        --color-text: #ffffff !important;
        --color-accent: #e9eee9 !important;
        --color-surface: #0b1e36 !important;
        --color-card: #0f2440 !important;
        --color-sub: #8aa0bb !important;
        color-scheme: dark !important;
      }

      html[data-pn-theme="light"],
      html[data-pn-theme="light"] body,
      html[data-pn-theme="light"] #root {
        background: #f7f9fc !important;
        color: #101828 !important;
      }

      html[data-pn-theme="light"] .pn-card,
      html[data-pn-theme="light"] .pn-surface,
      html[data-pn-theme="light"] aside,
      html[data-pn-theme="light"] header,
      html[data-pn-theme="light"] nav {
        background-color: #ffffff !important;
        color: #101828 !important;
        border-color: rgba(15, 23, 42, 0.12) !important;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05), 0 12px 28px rgba(16, 24, 40, 0.08) !important;
      }

      html[data-pn-theme="light"] .pn-input {
        background: #ffffff !important;
        color: #101828 !important;
        border-color: rgba(15, 23, 42, 0.22) !important;
      }

      html[data-pn-theme="light"] .bg-black\/60,
      html[data-pn-theme="light"] .bg-white\/5,
      html[data-pn-theme="light"] .bg-white\/\[0\.02\] {
        background-color: rgba(15, 23, 42, 0.04) !important;
      }

      html[data-pn-theme="light"] .border-white\/10,
      html[data-pn-theme="light"] .border-white\/5 {
        border-color: rgba(15, 23, 42, 0.12) !important;
      }

      html[data-pn-theme="light"] .text-text {
        color: #101828 !important;
      }

      html[data-pn-theme="light"] .text-sub {
        color: #667085 !important;
      }

      .pn-theme-toggle {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 14px);
        right: 14px;
        z-index: 9999;
        min-height: 40px;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.16);
        background: #ffffff;
        color: #101828;
        padding: 8px 12px;
        font: 700 12px/1 Inter, system-ui, sans-serif;
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.14);
      }

      html[data-pn-theme="dark"] .pn-theme-toggle {
        border-color: rgba(255, 255, 255, 0.14);
        background: #0f2440;
        color: #ffffff;
      }
    </style>
    <script>
      (function () {
        const emojiPattern =
          /[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}\u{200D}]/gu;
        const skipTags = new Set(["SCRIPT", "STYLE", "TEXTAREA", "INPUT"]);

        function setTheme(theme) {
          document.documentElement.setAttribute("data-pn-theme", theme);
          const button = document.querySelector("[data-testid='theme-toggle']");
          if (button) {
            button.textContent = theme === "light" ? "Dark mode" : "Light mode";
            button.setAttribute("aria-label", "Switch to " + (theme === "light" ? "dark" : "light") + " mode");
          }
        }

        function stripEmojiText(root) {
          const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
              const parent = node.parentElement;
              if (!parent || skipTags.has(parent.tagName)) return NodeFilter.FILTER_REJECT;
              emojiPattern.lastIndex = 0;
              return emojiPattern.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
            },
          });

          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          for (const node of nodes) {
            emojiPattern.lastIndex = 0;
            node.nodeValue = node.nodeValue.replace(emojiPattern, "").replace(/\s{2,}/g, " ");
          }
        }

        function mountThemeToggle() {
          if (document.querySelector("[data-testid='theme-toggle']")) return;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "pn-theme-toggle";
          button.dataset.testid = "theme-toggle";
          button.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-pn-theme") || "light";
            setTheme(current === "light" ? "dark" : "light");
          });
          document.body.appendChild(button);
          setTheme(document.documentElement.getAttribute("data-pn-theme") || "light");
        }

        setTheme("light");
        window.addEventListener("DOMContentLoaded", () => {
          mountThemeToggle();
          stripEmojiText(document.body);
          const observer = new MutationObserver(() => {
            stripEmojiText(document.body);
            mountThemeToggle();
          });
          observer.observe(document.body, { childList: true, subtree: true, characterData: true });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
